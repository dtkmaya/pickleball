<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball @ CP</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.5; }
  h1 { color: #2c3e50; }
  h2 { color: #34495e; margin-top: 20px; }
  .full { color: red; }
  .waitlist { color: orange; }
  li { margin-bottom: 4px; }
</style>
</head>
<body>

<h1>Pickleball @ CP</h1>
<p><strong>Date/Time:</strong> Thursday 2/4/26, 9:30 pm – 12:00 am</p>
<p><strong>Cost:</strong> $20 – PayID: Thi L – 0421 829 872</p>
<p><strong>Courts:</strong> 3 | <strong>Cap:</strong> 18 players | Drinks included</p>

<h2>Players (FULL)</h2>
<ol class="full" id="playerList"></ol>

<h2>Waiting List</h2>
<ol class="waitlist" id="waitList"></ol>

<script>
fetch('players.json')
  .then(res => res.json())
  .then(data => {
    const playerList = document.getElementById('playerList');
    playerList.innerHTML = data.players.map(p => `<li>${p}</li>`).join('');
    
    const waitList = document.getElementById('waitList');
    waitList.innerHTML = data.waitlist.map(p => `<li>${p}</li>`).join('');
  })
  .catch(err => console.error('Error loading player list:', err));
</script>

</body>
</html>
