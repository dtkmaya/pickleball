<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball @ CP</title>
<style>
	body { font-family: Arial, sans-serif; margin: 0; background-color: #FFC0CB; }
	header { background-color: #FFC0CB; color: white; padding: 10px 20px; display: flex; align-items: center; }
	header img { height: 40px; margin-right: 10px; }
	header h1 { margin: 0; font-size: 1.5em; }
	.container { padding: 20px; }

	table { 
		width: 100%; 
		border-collapse: collapse; 
		margin-top: 20px; 
		background-color: white; 
		border-radius: 8px;
		overflow: hidden;
	}

	th, td { 
		border: 1px solid #e0e0e0; 
		padding: 10px; 
		vertical-align: top; 
	}

	th { background-color: #c94f7c; color: white; }
	td { background-color: #fff7f9; }

	.player-new { color: green; font-weight: bold; }
	.player-dropped { text-decoration: line-through; color: grey; opacity: 0.7; }

	ol { padding-left: 20px; margin: 5px 0; }
	p { margin: 5px 0; }

	.pagination { text-align: center; margin-top: 15px; }
	.pagination button { padding: 5px 12px; margin: 0 5px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background-color: #c94f7c; color: white; }
	.pagination span { font-weight: bold; margin: 0 8px; font-size: 16px; }
</style>
</head>
<body>

<header>
  <img src="LogoWeb-Kangaroo.png" alt="Pickleball Logo">
  <h1 style="font-size: 1.4em; font-weight: 500;">Pickleball Weekly Game Sessions</h1>
</header>

<div class="container">
  <div id="tableContainer"></div>

  <div class="pagination">
    <button id="prevBtn">&#8592; Prev</button>
    <span id="pageNumber">1</span>
    <button id="nextBtn">Next &#8594;</button>
  </div>
</div>

<script>
const EVENTS_PER_PAGE = 3;
let currentPage = 1;
let eventsData = [];

function renderPage(page) {
  const container = document.getElementById('tableContainer');
  container.innerHTML = '';

  const start = (page - 1) * EVENTS_PER_PAGE;
  const end = start + EVENTS_PER_PAGE;
  const eventsPage = eventsData.slice(start, end);

  if(eventsPage.length === 0){
    container.innerHTML = '<p>No sessions to display.</p>';
    return;
  }

  const table = document.createElement('table');
  const datesRow = document.createElement('tr');
  const playersRow = document.createElement('tr');
  const waitlistRow = document.createElement('tr');

  eventsPage.forEach(event => {
    const th = document.createElement('th');
    const isFull = event.players.length >= (event.cap || 18);
    th.textContent = `${event.date}${isFull ? ' (FULL)' : ''}`;
    datesRow.appendChild(th);

    const tdPlayers = document.createElement('td');
    tdPlayers.innerHTML = `<strong>Players</strong>
      <ol>${event.players.map(p => {
        if(p.status === 'dropped' && p.replacement){
          return `<li class="player-dropped">${p.name}</li><li class="player-new">${p.replacement}</li>`;
        } else if(p.status === 'dropped'){
          return `<li class="player-dropped">${p.name}</li>`;
        } else if(p.status === 'new'){
          return `<li class="player-new">${p.name}</li>`;
        } else {
          return `<li>${p.name}</li>`;
        }
      }).join('')}</ol>`;
    playersRow.appendChild(tdPlayers);

    const tdWait = document.createElement('td');
    tdWait.innerHTML = `<strong>Waiting List</strong>
      <ol>${event.waitlist.map(p => `<li>${p.name}</li>`).join('')}</ol>`;
    waitlistRow.appendChild(tdWait);
  });

  table.appendChild(datesRow);
  table.appendChild(playersRow);
  table.appendChild(waitlistRow);
  container.appendChild(table);

  document.getElementById('pageNumber').textContent = page;
}

// Pagination
document.getElementById('prevBtn').addEventListener('click', () => {
  if(currentPage > 1){
    currentPage--;
    renderPage(currentPage);
  }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if(currentPage < Math.ceil(eventsData.length / EVENTS_PER_PAGE)){
    currentPage++;
    renderPage(currentPage);
  }
});

// Load JSON
fetch('players.json')
  .then(res => res.json())
  .then(data => {
    eventsData = data.events;
    renderPage(currentPage);
  })
  .catch(err => console.error('Error loading player list:', err));
</script>

</body>
</html>
