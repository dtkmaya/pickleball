<script>
let currentPage = 1;
const maxColumnsPerPage = 3;
let totalPages = 1;
let eventsData = [];

const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSPHBv4ZNccoG7YUoYMNYBCI-QRJfTE9ARrXY_sHtEIuSIcBxY1BC0zJM9dbUfYdjF6OfFOzbnrTQl4/pub?gid=0&single=true&output=csv';

const datesRow = document.getElementById('datesRow');
const playersRow = document.getElementById('playersRow');
const waitlistRow = document.getElementById('waitlistRow');
const navLeft = document.getElementById('navLeft');
const navRight = document.getElementById('navRight');
const loadingMsg = document.getElementById('loadingMsg');
const openFormBtn = document.getElementById('openFormBtn');


function goToForm() {
  window.location.href = "form.html";
}


// CSV to JSON
function csvToJson(csv) {
  const lines = csv.split('\n').filter(l => l.trim() !== '');
  const headers = lines[0].split(',').map(h => h.trim());

  return lines.slice(1).map(line => {
    const data = [];
    let current = '';
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];

      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        data.push(current.trim());
        current = '';
      } else {
        current += char;
      }
    }
    data.push(current.trim());

    let obj = {};
    headers.forEach((h, i) => obj[h] = data[i] || '');
    return obj;
  });
}



// Check if event expired
function isExpired(dateStr, timeStr) {
  try {
    const [startTime] = timeStr.split('–');
    const [hoursMinutes, meridiem] = startTime.match(/(\d{1,2}:\d{0,2})(am|pm)/i).slice(1);
    let [hours, minutes] = hoursMinutes.split(':').map(Number);
    if (isNaN(minutes)) minutes = 0;
    if (meridiem.toLowerCase() === 'pm' && hours !== 12) hours += 12;
    if (meridiem.toLowerCase() === 'am' && hours === 12) hours = 0;
    const [day, month, year] = dateStr.split('/').map(Number);
    const eventDate = new Date(2000 + year, month - 1, day, hours, minutes);
    return eventDate < new Date();
  } catch {
    return false;
  }
}

// Render page
function renderPage(page) {
  datesRow.innerHTML = '';
  playersRow.innerHTML = '';
  waitlistRow.innerHTML = '';

  const startIndex = (page - 1) * maxColumnsPerPage;
  const endIndex = Math.min(startIndex + maxColumnsPerPage, eventsData.length);
  const pageEvents = eventsData.slice(startIndex, endIndex);

  pageEvents.forEach(event => {
    const courtsText = event.courts || '-';
    const expired = isExpired(event.date, event.time);

    const th = document.createElement('th');
    th.innerHTML = `<strong>${event.date}, ${event.time}</strong><br>Courts: ${courtsText}<br>Cap: ${event.cap || '-'} | Cost: ${event.cost || '-'}`;
    if (expired) th.classList.add('expired');
    datesRow.appendChild(th);

    const tdPlayers = document.createElement('td');
    tdPlayers.innerHTML = `<strong>Players ${event.players.length >= (event.cap || event.players.length) ? '(FULL)' : ''}</strong>
      <ol>${event.players.map(p => {
        if (p.status === 'dropped' && p.replacement) {
          return `<li>
                    <span class="player-dropped">${p.name}</span> → 
                    <span class="player-new" style="text-decoration: none;">${p.replacement}</span>
                  </li>`;
        } else {
          let className = '';
          if (p.status === 'new') className = 'player-new';
          if (p.status === 'dropped') className = 'player-dropped';
          return `<li class="${className}">${p.name}</li>`;
        }
      }).join('')}</ol>`;
    if (expired) tdPlayers.classList.add('expired');
    playersRow.appendChild(tdPlayers);

    const tdWait = document.createElement('td');
    tdWait.innerHTML = `<strong>Waiting List</strong>
      <ol>${event.waitlist.map(p => `<li>${p.name}</li>`).join('')}</ol>`;
    if (expired) tdWait.classList.add('expired');
    waitlistRow.appendChild(tdWait);
  });

  navLeft.innerHTML = '';
  navRight.innerHTML = '';

  if (currentPage > 1) {
    const back = document.createElement('img');
    back.src = 'arrow_left.png';
    back.style.height = '30px';
    back.onclick = () => { currentPage--; renderPage(currentPage); };
    navLeft.appendChild(back);
  }

  if (currentPage < totalPages) {
    const forward = document.createElement('img');
    forward.src = 'arrow_right.png';
    forward.style.height = '30px';
    forward.onclick = () => { currentPage++; renderPage(currentPage); };
    navRight.appendChild(forward);
  }
}

// Load data
fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const rows = csvToJson(csv);
    // Get unique sessions
    // WAS: const sessionsMap = {};
    const id = (r.session_id || '').trim();

    rows.forEach(r => {
      if (!sessionsMap[id]) {
        sessionsMap[id] = {
          session_id: r.session_id,
          date: r.date,
          time: r.time,
          courts: r.courts,
          cap: Number(r.cap),
          cost: r.cost,
          players: [],
          waitlist: []
        };
      }
      const ev = sessionsMap[id];
      if ((r.list_type || '').toLowerCase() === 'player')
      //WAS: if (r.list_type === 'player') {
        ev.players.push(
          { 
            name: (r.name || '').trim(),
            status: (r.status || '').trim(),
            replacement: (r.replacement || '').trim()
        );
      } 
      else if (type === 'waitlist') {
        ev.waitlist.push({name: (r.name || '').trim()});
      }

eventsData = Object.values(sessionsMap);
    totalPages = Math.ceil(eventsData.length / maxColumnsPerPage);
    renderPage(currentPage);
    loadingMsg.style.display = 'none';
  })
  .catch(err => { console.error('Error loading sheet:', err); loadingMsg.innerText = 'Failed to load data'; });

// Open form page
openFormBtn.addEventListener('click', () => {
  window.open('event_invitation.html', '_blank');
});
</script>

</body>
</html>
