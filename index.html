<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball @ CP</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; background-color: #FFC0CB; }
  header { background-color: #FFC0CB; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
  header img { height: 40px; margin-right: 10px; }

  header h1 { 
    margin: 0; 
    font-size: 1.70em;
    font-weight: 700; 
    font-family: 'Impact', 'Arial Black', sans-serif;
    color: #fff;
    text-shadow: 2px 2px #c94f7c; 
    letter-spacing: 1px;
  }

  .container { padding: 20px; }

  .player-new { color: green; font-weight: bold; }
  .player-dropped { text-decoration: line-through; color: grey; opacity: 0.7; }

  table { 
    width: 100%; 
    border-collapse: collapse; 
    margin-top: 10px; 
    background-color: white; 
    border-radius: 8px;
    overflow: hidden;
    font-size: 0.96em;
  }

  th, td { border: 1px solid #e0e0e0; padding: 10px; vertical-align: top; }

  th { background-color: #c94f7c; color: white; } 
  td { background-color: #fff7f9; }

  .expired { 
    background-color: #d3d3d3 !important; 
    color: #888 !important; 
  }

  ol { 
    padding-left: 20px; 
    margin: 5px 0; 
    min-height: 220px;
  }

  p { margin: 5px 0; }

  /* Navigation arrows */
  .nav-left, .nav-right { 
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
  }
  .nav-left { left: 10px; }
  .nav-right { right: 10px; }

  /* Drinks included text */
  .drinks-info {
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 1.2em;
    color: #c94f7c;
    text-shadow: 1px 1px #fff;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<header>
  <div style="display: flex; align-items: center;">
    <img src="LogoWeb-Kangaroo.png" alt="Pickleball Logo">
    <h1>Pickleball Weekly Game Sessions</h1>
  </div>
</header>

<div class="container">
  <div class="drinks-info">Drinks included</div>

  <table id="eventsTable">
    <tr id="datesRow"></tr>
    <tr id="playersRow"></tr>
    <tr id="waitlistRow"></tr>
  </table>
</div>

<!-- Navigation arrows -->
<div id="navLeft" class="nav-left"></div>
<div id="navRight" class="nav-right"></div>

<script>
let currentPage = 1;
const maxColumnsPerPage = 3;
let totalPages = 1;
let eventsData = [];

const datesRow = document.getElementById('datesRow');
const playersRow = document.getElementById('playersRow');
const waitlistRow = document.getElementById('waitlistRow');
const navLeft = document.getElementById('navLeft');
const navRight = document.getElementById('navRight');

// Helper: check if event date/time has passed
function isExpired(eventDateStr) {
  try {
    // Format: "Thurs 02/4/26, 9:30pm–12:00am"
    const parts = eventDateStr.split(',');
    if (parts.length < 2) return false;

    const datePart = parts[0].trim().split(' ')[1]; // "02/4/26"
    const timePart = parts[1].trim().split('–')[0]; // "9:30pm"

    const [day, month, year] = datePart.split('/').map(Number);
    let [time, meridiem] = timePart.match(/(\d{1,2}:\d{2})(am|pm)/i).slice(1);
    let [hours, minutes] = time.split(':').map(Number);
    if (meridiem.toLowerCase() === 'pm' && hours !== 12) hours += 12;
    if (meridiem.toLowerCase() === 'am' && hours === 12) hours = 0;

    const eventDate = new Date(2000 + year, month - 1, day, hours, minutes);
    const now = new Date();
    return eventDate < now;
  } catch {
    return false;
  }
}

function renderPage(page) {
  datesRow.innerHTML = '';
  playersRow.innerHTML = '';
  waitlistRow.innerHTML = '';

  const startIndex = (page - 1) * maxColumnsPerPage;
  const endIndex = Math.min(startIndex + maxColumnsPerPage, eventsData.length);
  const pageEvents = eventsData.slice(startIndex, endIndex);

  pageEvents.forEach(event => {
    const courtsText = event.Courts || event.courts || '-';
    const expired = isExpired(event.date);

    const th = document.createElement('th');
    th.innerHTML = `<strong>${event.date}</strong><br>Courts: ${courtsText}<br>Cap: ${event.cap || '-'} | Cost: ${event.cost || '-'}`;
    if (expired) th.classList.add('expired');
    datesRow.appendChild(th);

    const tdPlayers = document.createElement('td');
    tdPlayers.innerHTML = `<strong>Players ${event.players.length >= (event.cap || event.players.length) ? '(FULL)' : ''}</strong>
      <ol>${event.players.map(p => {
        if (p.status === 'dropped' && p.replacement) {
          return `<li>
                    <span class="player-dropped">${p.name}</span> → 
                    <span class="player-new" style="text-decoration: none;">${p.replacement}</span>
                  </li>`;
        } else {
          let className = '';
          if (p.status === 'new') className = 'player-new';
          if (p.status === 'dropped') className = 'player-dropped';
          return `<li class="${className}">${p.name}</li>`;
        }
      }).join('')}</ol>`;
    if (expired) tdPlayers.classList.add('expired');
    playersRow.appendChild(tdPlayers);

    const tdWait = document.createElement('td');
    tdWait.innerHTML = `<strong>Waiting List</strong>
      <ol>${event.waitlist.map(p => `<li>${p.name}</li>`).join('')}</ol>`;
    if (expired) tdWait.classList.add('expired');
    waitlistRow.appendChild(tdWait);
  });

  // Navigation arrows
  navLeft.innerHTML = '';
  navRight.innerHTML = '';

  if (currentPage > 1) {
    const back = document.createElement('img');
    back.src = 'arrow_left.png';
    back.style.height = '30px';
    back.onclick = () => { currentPage--; renderPage(currentPage); };
    navLeft.appendChild(back);
  }

  if (currentPage < totalPages) {
    const forward = document.createElement('img');
    forward.src = 'arrow_right.png';
    forward.style.height = '30px';
    forward.onclick = () => { currentPage++; renderPage(currentPage); };
    navRight.appendChild(forward);
  }
}

fetch('players.json')
  .then(res => res.json())
  .then(data => {
    eventsData = data.events;
    totalPages = Math.ceil(eventsData.length / maxColumnsPerPage);
    renderPage(currentPage);
  })
  .catch(err => console.error('Error loading player list:', err));
</script>

</body>
</html>
