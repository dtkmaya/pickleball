<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball @ CP</title>

<!-- PapaParse for proper CSV parsing -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  body { font-family: Arial, sans-serif; margin: 0; background-color: #FFC0CB; }
  header { background-color: #FFC0CB; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
  header img { height: 40px; margin-right: 10px; }

  header h1 { 
    margin: 0; 
    font-size: 1.70em;
    font-weight: 700; 
    font-family: 'Impact', 'Arial Black', sans-serif;
    color: #fff;
    text-shadow: 2px 2px #c94f7c; 
    letter-spacing: 1px;
  }

  .container { padding: 20px; }

  .player-new { color: green; font-weight: bold; }
  .player-dropped { text-decoration: line-through; color: grey; opacity: 0.7; }

  table { 
    width: 100%; 
    border-collapse: collapse; 
    margin-top: 10px; 
    background-color: white; 
    border-radius: 8px;
    overflow: hidden;
    font-size: 0.96em;
  }

  th, td { border: 1px solid #e0e0e0; padding: 10px; vertical-align: top; }

  th { background-color: #c94f7c; color: white; } 
  td { background-color: #fff7f9; }

  .expired { 
    background-color: #d3d3d3 !important; 
    color: #888 !important; 
  }

  ol { 
    padding-left: 20px; 
    margin: 5px 0; 
    min-height: 220px;
  }

  p { margin: 5px 0; }

  /* Navigation arrows */
  .nav-left, .nav-right { 
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
  }
  .nav-left { left: 10px; }
  .nav-right { right: 10px; }

  /* Drinks included text */
  .drinks-info {
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 1.1em;
    color: #c94f7c;
    text-shadow: 1px 1px #fff;
    margin-bottom: 4px;
  }

  .payid-info {
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 1.1em; /* slightly smaller */
    color: #c94f7c;
    text-shadow: 1px 1px #fff;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<header>
  <div style="display: flex; align-items: center;">
    <img src="LogoWeb-Kangaroo.png" alt="Pickleball Logo">
    <h1>Pickleball Weekly Game Sessions</h1>
  </div>
</header>

<div class="container">
  <div class="drinks-info">Drinks included</div>
  <div class="payid-info">PayID Thi L: 0421 829 972</div>

  <table id="eventsTable">
    <tr id="datesRow"></tr>
    <tr id="playersRow"></tr>
    <tr id="waitlistRow"></tr>
  </table>
</div>

<!-- Navigation arrows -->
<div id="navLeft" class="nav-left"></div>
<div id="navRight" class="nav-right"></div>

<script>
let currentPage = 1;
const maxColumnsPerPage = 3;
let totalPages = 1;
let eventsData = [];

const SESSION_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTirsSiBtc0LCzudvZzT92WZY74cdsLjO_KTPALFNYwmGWjgeoB86iOoiRVbp14Ij4Fs7TgFkb99yQd/pub?gid=0&single=true&output=csv';
const PLAYER_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSDAydPfDdKWP1mESRNYJxSoRV4llsAb4-wSV_gpzmVxqrx6yraMsvssY1sfU7TjQllXsgKkpfKAPGF/pub?output=csv';

const datesRow = document.getElementById('datesRow');
const playersRow = document.getElementById('playersRow');
const waitlistRow = document.getElementById('waitlistRow');
const navLeft = document.getElementById('navLeft');
const navRight = document.getElementById('navRight');

// --- Updated csvToJson using PapaParse ---
function csvToJson(csv) {
  return Papa.parse(csv, {
    header: true,
    skipEmptyLines: true
  }).data;
}

// Helper: check if event date/time has passed
function isExpired(dateStr, timeStr) {
  try {
    const [startTime] = timeStr.split('–');
    const [hoursMinutes, meridiem] = startTime.match(/(\d{1,2}:\d{0,2})(am|pm)/i).slice(1);
    let [hours, minutes] = hoursMinutes.split(':').map(Number);
    if (isNaN(minutes)) minutes = 0;
    if (meridiem.toLowerCase() === 'pm' && hours !== 12) hours += 12;
    if (meridiem.toLowerCase() === 'am' && hours === 12) hours = 0;

    const [day, month, year] = dateStr.split('/').map(Number);
    const eventDate = new Date(2000 + year, month - 1, day, hours, minutes);
    return eventDate < new Date();
  } catch {
    return false;
  }
}

// Render page
function renderPage(page) {
  datesRow.innerHTML = '';
  playersRow.innerHTML = '';
  waitlistRow.innerHTML = '';

  const startIndex = (page - 1) * maxColumnsPerPage;
  const endIndex = Math.min(startIndex + maxColumnsPerPage, eventsData.length);
  const pageEvents = eventsData.slice(startIndex, endIndex);

  pageEvents.forEach(event => {
    const courtsText = event.courts || '-';
    const expired = isExpired(event.date, event.time);

    const th = document.createElement('th');
    th.innerHTML = `<strong>${event.date}, ${event.time}</strong><br>Courts: ${courtsText}<br>Cap: ${event.cap || '-'} | Cost: ${event.cost || '-'}`;
    if (expired) th.classList.add('expired');
    datesRow.appendChild(th);

    const tdPlayers = document.createElement('td');
    tdPlayers.innerHTML = `<strong>Players ${event.players.length >= (event.cap || event.players.length) ? '(FULL)' : ''}</strong>
      <ol>${event.players.map(p => {
        if (p.status === 'dropped' && p.replacement) {
          return `<li>
                    <span class="player-dropped">${p.name}</span> → 
                    <span class="player-new" style="text-decoration: none;">${p.replacement}</span>
                  </li>`;
        } else {
          let className = '';
          if (p.status === 'new') className = 'player-new';
          if (p.status === 'dropped') className = 'player-dropped';
          return `<li class="${className}">${p.name}</li>`;
        }
      }).join('')}</ol>`;
    if (expired) tdPlayers.classList.add('expired');
    playersRow.appendChild(tdPlayers);

    const tdWait = document.createElement('td');
    tdWait.innerHTML = `<strong>Waiting List</strong>
      <ol>${event.waitlist.map(p => `<li>${p.name}</li>`).join('')}</ol>`;
    if (expired) tdWait.classList.add('expired');
    waitlistRow.appendChild(tdWait);
  });

  // Navigation arrows
  navLeft.innerHTML = '';
  navRight.innerHTML = '';

  if (currentPage > 1) {
    const back = document.createElement('img');
    back.src = 'arrow_left.png';
    back.style.height = '30px';
    back.onclick = () => { currentPage--; renderPage(currentPage); };
    navLeft.appendChild(back);
  }

  if (currentPage < totalPages) {
    const forward = document.createElement('img');
    forward.src = 'arrow_right.png';
    forward.style.height = '30px';
    forward.onclick = () => { currentPage++; renderPage(currentPage); };
    navRight.appendChild(forward);
  }
}

// Fetch Sheets and build eventsData
Promise.all([
  fetch(SESSION_SHEET_URL).then(res => res.text()),
  fetch(PLAYER_SHEET_URL).then(res => res.text())
]).then(([sessionCsv, playerCsv]) => {
  const sessions = csvToJson(sessionCsv);
  const players = csvToJson(playerCsv);

  eventsData = sessions.map(session => {
    const sessionPlayers = players.filter(p => p.session_id === session.session_id);

    return {
      date: session.date,
      time: session.time,
      courts: session.courts,
      cap: Number(session.cap),
      cost: session.cost,

      players: sessionPlayers
        .filter(p => p.list_type === 'player')
        .map(p => ({
          name: p.name,
          status: p.status,
          replacement: p.replacement
        })),

      waitlist: sessionPlayers
        .filter(p => p.list_type === 'waitlist')
        .map(p => ({ name: p.name }))
    };
  });

  totalPages = Math.ceil(eventsData.length / maxColumnsPerPage);
  renderPage(currentPage);
}).catch(err => console.error('Error loading sheets:', err));
</script>

</body>
</html>
