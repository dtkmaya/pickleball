<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball @ CP</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 0; background-color: #FFC0CB; }

/* Header */
header {
  background-color: #FFC0CB;
  padding: 10px 20px;
  display: flex;
  align-items: center;
}
header h1 {
  font-family: Impact, sans-serif;
  color: white;
  text-shadow: 2px 2px #c94f7c;
  margin: 0;
}

/* Banner */
.banner img {
  width: 100%;
  max-width: 803px;
  display: block;
  margin: auto;
}

/* Card */
.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  text-align: center;
}

/* Button */
.toggle-btn {
  font-family: Impact, sans-serif;
  font-size: 1.2em;
  padding: 10px 20px;
  background-color: #c94f7c;
  color: white;
  border: none;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* Info text */
.info-text {
  font-family: Impact, sans-serif;
  font-size: 1.1em;
  color: #c94f7c;
  margin: 5px 0;
}

/* Table */
.container { padding: 0 15px 20px; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}
th, td { padding: 10px; border: 1px solid #eee; }
th { background: #c94f7c; color: white; }
td { background: #fff7f9; }

.expired { background: #ddd !important; color: #888 !important; }

/* Footer */
.footer {
  text-align: center;
  padding: 15px;
  font-size: 0.9em;
}

.footer a {
  color: #c94f7c;
  text-decoration: none;
  font-weight: bold;
}

.footer img {
  height: 25px;
  margin-top: 8px;
}
</style>
</head>

<body>

<header>
  <h1>Pickleball Weekly Game Sessions</h1>
</header>

<!-- Banner -->
<div class="banner">
  <img src="banner.png">
</div>

<!-- Info Card -->
<div class="card">
  <button class="toggle-btn" onclick="toggleSection()">Upcoming Sessions ▼</button>

  <div class="info-text">Drinks included</div>
  <div class="info-text">PayID Thi L: 0421 829 972</div>
  <div class="info-text">Organizer: Maggie</div>
</div>

<!-- Sessions -->
<div id="sessionSection" class="container">

  <table>
    <tr id="datesRow"></tr>
    <tr id="playersRow"></tr>
    <tr id="waitlistRow"></tr>
  </table>

</div>

<!-- Footer -->
<div class="footer">
  <div>
    <a href="https://www.google.com/maps/search/?api=1&query=Central+Pickleball+Bankstown" target="_blank">
      📍 Get Directions to Central Pickleball Bankstown
    </a>
  </div>

  <div>© LZGroup</div>
  <img src="logo_lzgroup.png" alt="LZGroup Logo">
</div>

<script>
// Toggle
function toggleSection() {
  const section = document.getElementById('sessionSection');
  section.style.display = (section.style.display === 'none') ? 'block' : 'none';
}

// CSV
function csvToJson(csv) {
  return Papa.parse(csv, { header: true, skipEmptyLines: true }).data;
}

// Expiry
function isExpired(dateStr) {
  const [d,m,y] = dateStr.split('/');
  const date = new Date(2000 + Number(y), m-1, d);
  return date < new Date();
}
</script>

</body>
</html>
