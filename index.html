<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball @ CP</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Outfit', sans-serif;
  margin: 0;
  background: #FFC0CB;
}

/* HEADER */
header {
  padding: 15px;
  text-align: center;
  color: white;
  font-weight: 600;
  font-size: 1.5em;
}

/* HERO */
.hero {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.15);
}

.hero h2 {
  margin: 0;
}

.hero p {
  color: #666;
}

/* CARDS */
.card-row {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.card {
  flex: 1;
  background: #fff7f9;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

/* BUTTONS */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #c94f7c;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 500;
}

/* INFO TEXT */
.info {
  text-align: center;
  margin-top: 10px;
  color: #c94f7c;
  font-weight: 600;
}

/* TABLE */
.container { padding: 15px; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td { padding: 10px; border: 1px solid #eee; }
th { background: #c94f7c; color: white; }
td { background: #fff7f9; }

.expired {
  background: #ddd !important;
  color: #888 !important;
}

/* NAV */
.nav-left, .nav-right {
  position: fixed;
  top: 50%;
  cursor: pointer;
}
.nav-left { left: 10px; }
.nav-right { right: 10px; }

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
}
.footer a {
  color: #c94f7c;
  font-weight: 600;
}
</style>
</head>

<body>

<header>Pickleball Weekly Game Sessions</header>

<!-- HERO -->
<div class="hero">
  <h2>You're Invited 🎾</h2>
  <p>Weekly friendly pickleball sessions. Come join us!</p>

  <div class="card-row">
    <div class="card">
      <div>Date</div>
      <strong id="heroDate">-</strong>
    </div>
    <div class="card">
      <div>Time</div>
      <strong id="heroTime">-</strong>
    </div>
    <div class="card">
      <div>Location</div>
      <strong>Bankstown</strong>
    </div>
  </div>

  <div style="text-align:center;">
    <a href="#" class="btn" onclick="toggleSection()">Upcoming Sessions</a>
    <a href="https://docs.google.com/forms" target="_blank" class="btn">RSVP</a>
  </div>

  <div class="info">Drinks included | PayID Thi L: 0421 829 972 | Organizer: Maggie</div>
</div>

<!-- TABLE -->
<div id="sessionSection" class="container">
  <table>
    <tr id="datesRow"></tr>
    <tr id="playersRow"></tr>
    <tr id="waitlistRow"></tr>
  </table>
</div>

<div id="navLeft" class="nav-left"></div>
<div id="navRight" class="nav-right"></div>

<!-- FOOTER -->
<div class="footer">
  <a href="https://www.google.com/maps/search/?api=1&query=Central+Pickleball+Bankstown" target="_blank">
    📍 Get Directions
  </a>
  <div>© LZGroup</div>
</div>

<script>
let currentPage = 1;
const maxColumnsPerPage = 3;
let eventsData = [];

const SESSION_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRu60f6E2q_EbTv3QGvhHImUnpZbJj6106zEb1eN9uGJx_mOsOQRq27DA8V1AxXL5ld9yOVJ-RU3e3-/pub?output=csv'; // replace with your Google Sheet CSV link
const PLAYER_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6LUO1jogAVhhEdNY0QiwMgkyVNoR7QFCmxWcUFsQ063ohf3wcJS_QMOdx1iHmjxjazMwWe_cIaQ-K/pub?output=csv';   // replace with your Google Sheet CSV link


const datesRow = document.getElementById('datesRow');
const playersRow = document.getElementById('playersRow');
const waitlistRow = document.getElementById('waitlistRow');

// CSV
function csvToJson(csv) {
  const lines = csv.split('\n').filter(l => l.trim() !== '');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const data = line.split(',');
    let obj = {};
    headers.forEach((h, i) => obj[h] = data[i]);
    return obj;
  });
}

// Expired
function isExpired(dateStr) {
  const [d,m,y] = dateStr.split('/');
  return new Date(2000+y, m-1, d) < new Date();
}

// Toggle
function toggleSection() {
  const el = document.getElementById('sessionSection');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// Render
function renderPage(page) {
  datesRow.innerHTML = '';
  playersRow.innerHTML = '';
  waitlistRow.innerHTML = '';

  const events = eventsData.slice((page-1)*3, page*3);

  events.forEach((e, i) => {
    if (i === 0) {
      document.getElementById('heroDate').innerText = e.date;
      document.getElementById('heroTime').innerText = e.time;
    }

    const expired = isExpired(e.date);

    const th = document.createElement('th');
    th.innerHTML = `${e.date}<br>${e.time}`;
    if (expired) th.classList.add('expired');
    datesRow.appendChild(th);

    const td1 = document.createElement('td');
    td1.innerHTML = `<ol>${e.players.map(p=>`<li>${p.name}</li>`).join('')}</ol>`;
    if (expired) td1.classList.add('expired');
    playersRow.appendChild(td1);

    const td2 = document.createElement('td');
    td2.innerHTML = `<ol>${e.waitlist.map(p=>`<li>${p.name}</li>`).join('')}</ol>`;
    if (expired) td2.classList.add('expired');
    waitlistRow.appendChild(td2);
  });
}

// Load
Promise.all([
  fetch(SESSION_SHEET_URL).then(r=>r.text()),
  fetch(PLAYER_SHEET_URL).then(r=>r.text())
]).then(([s,p])=>{
  const sessions = csvToJson(s);
  const players = csvToJson(p);

  eventsData = sessions.map(s=>{
    const sp = players.filter(p=>p.session_id===s.session_id);
    return {
      date: s.date,
      time: s.time,
      players: sp.filter(p=>p.list_type==='player'),
      waitlist: sp.filter(p=>p.list_type==='waitlist')
    };
  });

  renderPage(1);
});
</script>

</body>
</html>
